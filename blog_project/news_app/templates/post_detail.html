<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>{{ BAIVIET.TITLE }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"></a>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8 bg-white p-5 shadow-sm rounded">
                
                <h1 class="text-primary mb-3 fw-bold">{{ BAIVIET.TITLE }}</h1>
                
                <p class="text-muted border-bottom pb-3 mb-4">
                    Tác giả: <strong>{{ BAIVIET.TACGIA }}</strong> | 
                    Danh mục: <strong>{{ BAIVIET.BAIVIET.NAME }}</strong> | 
                    Đăng lúc: {{ BAIVIET.NGAYDANG|date:"d/m/Y H:i" }}
                </p>        
                
                {% if BAIVIET.HINHANH %}
                    <div class="text-center mb-4">
                        <img src="{{ BAIVIET.HINHANH.url }}" alt="{{ BAIVIET.TITLE }}" class="img-fluid rounded shadow-sm" style="max-height: 500px; width: 100%; object-fit: cover;">
                    </div>
                {% endif %}
                
                <div class="mt-4 fs-5 text-dark" style="line-height: 1.8; text-align: justify;">
                    {{ BAIVIET.CONTENT|linebreaks }}
                </div>
                
                <div class="mt-5 pt-4 border-top">
                    <h4 class="fw-bold mb-4">Bình luận của bạn</h4>
                    
                    <form action="#" method="POST">
                        
                        <div class="mb-3">
                            <textarea class="form-control bg-light" id="commentContent" name="content" rows="4" placeholder="Chia sẻ suy nghĩ của bạn về bài viết này..." style="resize: none; border-radius: 10px; border: 1px solid #dee2e6;"></textarea>
                        </div>
                        
                        <div class="d-flex justify-content-end">
                            <button type="reset" class="btn btn-light px-4 rounded-pill fw-bold me-2 border">Hủy</button>
                            <button type="submit" class="btn btn-primary px-4 rounded-pill fw-bold">Gửi bình luận</button>
                        </div>
                        
                    </form>
                </div>
                </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
