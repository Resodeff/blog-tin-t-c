{% extends "base.html" %}

{% block title %}Xoa bai viet | Blog Tin Tuc{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm rounded-4" style="margin-bottom: 1.5rem !important;">
                <div class="card-body p-4 p-md-5">
                    <h2 class="fw-bold text-danger mb-3">Xóa bài viết</h2>
                    <p class="mb-2">Bạn có chắc chắn muốn xóa bài viết sau</p>
                    <p class="fw-semibold fs-5">{{ BAIVIET.TITLE }}</p>
                    <p class="text-muted">Hành động này không thể hoàn tác.</p>

                    <form method="post" class="d-flex flex-wrap gap-2 mt-4">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger rounded-pill px-4">Xác nhận xóa</button>
                        <a href="{% url 'post_detail' BAIVIET.id %}" class="btn btn-outline-secondary rounded-pill px-4">Quay lại</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
